# Horizontal Pod Autoscalers for all microservices
# Automatically scales pods based on CPU utilization (70% threshold)
# Each service can scale from 2 to 5 replicas

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: cloud-parking
spec:
  # Target the auth-service deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  # Maintain between 2-5 replicas
  minReplicas: 1
  maxReplicas: 5
  # Scale based on CPU utilization
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when average CPU exceeds 70%
---
